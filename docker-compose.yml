services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  seed:
    build: ./server
    command: npm run seed
    environment:
      - MONGODB_URI=mongodb://mongo:27017/sharp-sk-brownies
    depends_on:
      - mongo
    restart: "no"

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/sharp-sk-brownies
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-rzp_test_placeholder_id}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-rzp_test_placeholder_secret}
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      seed:
        condition: service_completed_successfully

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_RAZORPAY_KEY_ID=${VITE_RAZORPAY_KEY_ID:-rzp_test_placeholder_id}
      - VITE_UPI_ID=${VITE_UPI_ID:-}
      - VITE_UPI_PAYEE_NAME=${VITE_UPI_PAYEE_NAME:-Sharp SK Brownies}
    depends_on:
      - server

volumes:
  mongo-data:
